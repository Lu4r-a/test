<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --panel-bg: #1e1e1e;
        }

        [data-theme="light"] {
            --bg-color: #f0f0f0;
            --text-color: #121212;
            --accent-color: #e6b800;
            --panel-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .profile-icon:hover { border-color: white; }

        #games {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
        }

        .modal input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }

        .auth-btn {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .stats-list {
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .settings-btn {
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        footer { text-align: center; padding: 20px; opacity: 0.7; }
        .heart { color: #ff4d4d; }
    </style>
</head>
<body>

    <header>
        <h1>Chicken Games</h1>
        <div class="nav-right">
            <button class="settings-btn" onclick="toggleSettings()">Settings</button>
            <div id="auth-section">
                <button class="settings-btn" onclick="openModal('login-modal')">Login</button>
            </div>
            <div id="user-profile" style="display:none;" onclick="openModal('profile-modal')">
                <div class="profile-icon" id="user-initial">?</div>
            </div>
        </div>
    </header>

    <div id="games"></div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2 id="auth-title">Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">Submit</button>
            <p style="font-size: 0.8rem; cursor:pointer;" onclick="toggleAuthMode()" id="auth-toggle">Need an account? Sign up</p>
            <button class="auth-btn" style="background:#444; color:white; margin-top:5px;" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2 id="profile-name">Profile</h2>
            <hr border="0" height="1px" background="#444">
            <h4>Activity Log</h4>
            <div id="stats-container" class="stats-list"></div>
            <button class="auth-btn" style="background:#ff4d4d; margin-top:20px;" onclick="logout()">Logout</button>
            <button class="auth-btn" style="background:#444; color:white; margin-top:5px;" onclick="closeModals()">Close</button>
        </div>
    </div>

    <div id="settings-panel" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div style="text-align:left;">
                <label>Theme</label>
                <select id="theme-select" onchange="updateTheme(this.value)" style="width:100%; padding:10px; margin-bottom:15px;">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                </select>
                <label>Automatic Cloaking</label>
                <select id="cloak-select" onchange="updateCloak(this.value)" style="width:100%; padding:10px;">
                    <option value="off">Off</option>
                    <option value="on">On (About:Blank)</option>
                </select>
            </div>
            <button class="auth-btn" style="margin-top:20px;" onclick="toggleSettings()">Save & Close</button>
        </div>
    </div>

    <footer>Made with <span class="heart">❤</span> by chickenmonkey278</footer>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    <script>
        Lumin.init({ container: '#games', theme: 'dark' });

        // --- AUTH & TRACKING LOGIC ---
        let currentUser = JSON.parse(sessionStorage.getItem('activeUser')) || null;
        let isSignUp = false;

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? 'Sign Up' : 'Login';
            document.getElementById('auth-toggle').innerText = isSignUp ? 'Have an account? Login' : 'Need an account? Sign up';
        }

        function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Fill all fields");

            let users = JSON.parse(localStorage.getItem('chicken-users')) || {};

            if (isSignUp) {
                if(users[u]) return alert("Username taken");
                users[u] = { password: p, stats: {} };
                localStorage.setItem('chicken-users', JSON.stringify(users));
                alert("Account created! Now login.");
                toggleAuthMode();
            } else {
                if(users[u] && users[u].password === p) {
                    currentUser = u;
                    sessionStorage.setItem('activeUser', JSON.stringify(u));
                    location.reload();
                } else {
                    alert("Invalid credentials");
                }
            }
        }

        function logout() {
            sessionStorage.removeItem('activeUser');
            location.reload();
        }

        // Time Tracking Logic
        let startTime = Date.now();
        window.onbeforeunload = function() {
            if(currentUser) {
                let users = JSON.parse(localStorage.getItem('chicken-users'));
                let duration = Math.floor((Date.now() - startTime) / 1000 / 60); // minutes
                if(duration > 0) {
                    users[currentUser].stats['Total Playtime'] = (users[currentUser].stats['Total Playtime'] || 0) + duration;
                    localStorage.setItem('chicken-users', JSON.stringify(users));
                }
            }
        };

        // UI Updates
        function updateProfileUI() {
            if(currentUser) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-initial').innerText = currentUser[0].toUpperCase();
                document.getElementById('profile-name').innerText = currentUser;
                
                let users = JSON.parse(localStorage.getItem('chicken-users'));
                let stats = users[currentUser].stats;
                let html = `Playtime: ${stats['Total Playtime'] || 0} mins<br><br><b>Recent Games:</b><br>`;
                // Note: Lumin doesn't expose game titles easily, so we track general site usage.
                document.getElementById('stats-container').innerHTML = html + "Gaming Session Active...";
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        // --- ORIGINAL SETTINGS LOGIC ---
        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('chicken-theme', theme);
        }

        function updateCloak(status) {
            localStorage.setItem('chicken-cloak', status);
        }

        window.onload = () => {
            updateProfileUI();
            const savedTheme = localStorage.getItem('chicken-theme') || 'dark';
            const savedCloak = localStorage.getItem('chicken-cloak') || 'off';
            updateTheme(savedTheme);
            document.getElementById('theme-select').value = savedTheme;
            document.getElementById('cloak-select').value = savedCloak;

            if (savedCloak === 'on' && window.top === window.self) {
                const url = window.location.href;
                const win = window.open('about:blank', '_blank');
                if (win) {
                    const iframe = win.document.createElement('iframe');
                    iframe.style = "border:none;width:100%;height:100vh;margin:0;";
                    iframe.src = url;
                    win.document.body.appendChild(iframe);
                    window.location.replace('https://google.com');
                }
            }
        };
    </script>
</body>
</html>
