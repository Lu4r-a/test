<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --panel-bg: #1e1e1e;
        }

        /* Themes */
        [data-theme="light"] { --bg-color: #f0f0f0; --text-color: #121212; --accent-color: #e6b800; --panel-bg: #ffffff; }
        [data-theme="midnight"] { --bg-color: #0a0e1a; --text-color: #d1d1d1; --accent-color: #4d94ff; --panel-bg: #151b2d; }
        [data-theme="forest"] { --bg-color: #0d1a0d; --text-color: #e0e0e0; --accent-color: #4CAF50; --panel-bg: #1a2e1a; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }

        .status-container { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: bold; }
        .dot { height: 10px; width: 10px; background-color: #2ecc71; border-radius: 50%; box-shadow: 0 0 8px #2ecc71; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        h1 { color: var(--accent-color); margin: 0; font-size: 1.8rem; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .settings-btn { background: none; border: 2px solid var(--accent-color); color: var(--accent-color); padding: 8px 16px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        #games { flex: 1; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* Panels */
        #settings-panel, #login-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .panel-content {
            background: var(--panel-bg); padding: 30px;
            border-radius: 15px; width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 80vh; overflow-y: auto;
        }

        .setting-item { margin-bottom: 20px; text-align: left; }
        input, select, .panel-btn { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .panel-btn { background: var(--accent-color); color: black; border: none; font-weight: bold; cursor: pointer; }

        /* Recent Games List Style */
        .recent-list { list-style: none; padding: 0; margin-top: 10px; }
        .recent-item { background: rgba(255,255,255,0.05); padding: 8px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem; border-left: 3px solid var(--accent-color); }

        footer { text-align: center; padding: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>

    <header>
    <h1>Chicken Games</h1>
    <div>
        <a href="social.html" class="settings-btn" style="text-decoration:none">Social</a>
        <button class="settings-btn" onclick="toggleSettings()">Settings</button>
    </div>
</header>

    <div id="games"></div>

    <div id="login-panel" style="display: flex;">
        <div class="panel-content">
            <h2>Welcome</h2>
            <input type="text" id="username-input" placeholder="Choose a Username...">
            <button class="panel-btn" onclick="login()">Start Playing</button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="panel-content">
            <h2>Settings</h2>
            <div class="setting-item">
                <label>Theme</label>
                <select id="theme-select" onchange="updateTheme(this.value)">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                    <option value="midnight">Midnight Blue</option>
                    <option value="forest">Forest Green</option>
                </select>
            </div>

            <div class="setting-item">
                <label>Recently Played</label>
                <div id="recent-games-container">
                    <ul class="recent-list" id="recent-list">
                        <li class="recent-item">No games played yet</li>
                    </ul>
                </div>
            </div>

            <div id="stats-area" style="font-size: 0.8rem; border-top: 1px solid #444; padding-top: 10px;">
                <p>User: <span id="stat-username">---</span></p>
                <p>Total Playtime: <span id="stat-total-time">0</span> mins</p>
            </div>

            <button class="panel-btn" onclick="togglePanel('settings-panel')">Save & Close</button>
        </div>
    </div>

    <footer>Made with <span class="heart">❤</span> by chickenmonkey278</footer>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    <script>
        let totalPlaytime = parseInt(localStorage.getItem('total-playtime')) || 0;
        let sessionMinutes = 0;
        let currentUser = localStorage.getItem('username');
        let recentGames = JSON.parse(localStorage.getItem('recent-games')) || [];

        // 1. Initialize Lumin and Hook into Game Clicks
        Lumin.init({
            container: '#games',
            theme: 'dark',
            onGameClick: function(game) {
                // This captures the game name when you click it
                addToRecent(game.title || game.name);
            }
        });

        function addToRecent(gameName) {
            // Remove if already exists (to move it to top)
            recentGames = recentGames.filter(g => g !== gameName);
            // Add to beginning
            recentGames.unshift(gameName);
            // Keep only top 5
            if (recentGames.length > 5) recentGames.pop();
            
            localStorage.setItem('recent-games', JSON.stringify(recentGames));
            renderRecentList();
        }

        function renderRecentList() {
            const list = document.getElementById('recent-list');
            if (recentGames.length === 0) {
                list.innerHTML = '<li class="recent-item">No games played yet</li>';
                return;
            }
            list.innerHTML = recentGames.map(game => `<li class="recent-item">${game}</li>`).join('');
        }

        function login() {
            const user = document.getElementById('username-input').value;
            if (user.trim() !== "") {
                currentUser = user;
                localStorage.setItem('username', user);
                document.getElementById('login-panel').style.display = 'none';
                updateStatsUI();
            }
        }

        function togglePanel(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
            if (id === 'settings-panel') renderRecentList();
        }

        // Time Tracking
        setInterval(() => {
            if (!currentUser) return;
            sessionMinutes++;
            totalPlaytime++;
            localStorage.setItem('total-playtime', totalPlaytime);
            document.getElementById('session-time').innerText = sessionMinutes + "m";
            updateStatsUI();
        }, 60000);

        function updateStatsUI() {
            document.getElementById('stat-username').innerText = currentUser || "Guest";
            document.getElementById('stat-total-time').innerText = totalPlaytime;
        }

        function updateTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('chicken-theme', theme);
        }

        window.onload = () => {
            if (currentUser) document.getElementById('login-panel').style.display = 'none';
            const savedTheme = localStorage.getItem('chicken-theme') || 'dark';
            updateTheme(savedTheme);
            document.getElementById('theme-select').value = savedTheme;
            renderRecentList();
            updateStatsUI();
        };

        // Fake Online Count
        setInterval(() => {
            const base = Math.floor(Math.random() * 20) + 110; 
            document.getElementById('online-count').innerText = `${base} People Online`;
        }, 5000);
    </script>
</body>
</html>
