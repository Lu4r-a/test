<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --panel-bg: #1e1e1e;
        }

        /* Themes */
        [data-theme="light"] { --bg-color: #f0f0f0; --text-color: #121212; --accent-color: #e6b800; --panel-bg: #ffffff; }
        [data-theme="midnight"] { --bg-color: #0a0e1a; --text-color: #d1d1d1; --accent-color: #4d94ff; --panel-bg: #151b2d; }
        [data-theme="forest"] { --bg-color: #0d1a0d; --text-color: #e0e0e0; --accent-color: #4CAF50; --panel-bg: #1a2e1a; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* Header & Online Indicator */
        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .dot {
            height: 10px; width: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        h1 { color: var(--accent-color); margin: 0; font-size: 1.8rem; }

        .nav-right { display: flex; gap: 15px; align-items: center; }

        .settings-btn {
            background: none; border: 2px solid var(--accent-color);
            color: var(--accent-color); padding: 8px 16px;
            cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s;
        }

        .settings-btn:hover { background: var(--accent-color); color: #000; }

        /* Login & Stats */
        #user-info { font-size: 0.9rem; border-right: 1px solid #444; padding-right: 15px; }

        /* Games Container */
        #games { flex: 1; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* Panels */
        #settings-panel, #login-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .panel-content {
            background: var(--panel-bg); padding: 30px;
            border-radius: 15px; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .setting-item { margin-bottom: 20px; text-align: left; }
        .setting-item label { display: block; margin-bottom: 8px; font-size: 0.9rem; }

        input, select, .panel-btn {
            width: 100%; padding: 12px; margin-top: 5px;
            border-radius: 5px; border: 1px solid #444;
            background: #2a2a2a; color: white; box-sizing: border-box;
        }

        .panel-btn {
            background: var(--accent-color); color: black;
            border: none; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        footer { text-align: center; padding: 20px; font-size: 0.9rem; opacity: 0.7; }
        .heart { color: #ff4d4d; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Chicken Games</h1>
            <div class="status-container">
                <span class="dot"></span>
                <span id="online-count">124 People Online</span>
            </div>
        </div>
        
        <div class="nav-right">
            <div id="user-info">Playtime: <span id="session-time">0m</span></div>
            <button class="settings-btn" onclick="togglePanel('settings-panel')">Settings</button>
        </div>
    </header>

    <div id="games"></div>

    <div id="login-panel" style="display: flex;">
        <div class="panel-content">
            <h2>Welcome Back</h2>
            <p>Enter a username to track your progress.</p>
            <input type="text" id="username-input" placeholder="Username...">
            <button class="panel-btn" onclick="login()">Start Playing</button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="panel-content">
            <h2>Settings</h2>
            
            <div class="setting-item">
                <label>Theme</label>
                <select id="theme-select" onchange="updateTheme(this.value)">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                    <option value="midnight">Midnight Blue</option>
                    <option value="forest">Forest Green</option>
                </select>
            </div>

            <div class="setting-item">
                <label>Automatic Cloaking</label>
                <select id="cloak-select" onchange="updateCloak(this.value)">
                    <option value="off">Off</option>
                    <option value="on">On (About:Blank)</option>
                </select>
            </div>

            <div id="stats-area" style="font-size: 0.8rem; text-align: left; border-top: 1px solid #444; padding-top: 10px;">
                <p>User: <span id="stat-username">---</span></p>
                <p>Total Life Playtime: <span id="stat-total-time">0</span> mins</p>
            </div>

            <button class="panel-btn" onclick="togglePanel('settings-panel')">Save & Close</button>
        </div>
    </div>

    <footer>
        Made with <span class="heart">❤</span> by chickenmonkey278
    </footer>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    <script>
        // Data States
        let totalPlaytime = parseInt(localStorage.getItem('total-playtime')) || 0;
        let sessionMinutes = 0;
        let currentUser = localStorage.getItem('username');

        // Initialize Lumin
        Lumin.init({ container: '#games', theme: 'dark' });

        function togglePanel(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        // Login Logic
        function login() {
            const user = document.getElementById('username-input').value;
            if (user.trim() !== "") {
                currentUser = user;
                localStorage.setItem('username', user);
                document.getElementById('login-panel').style.display = 'none';
                updateStatsUI();
            }
        }

        // Playtime Tracker
        setInterval(() => {
            sessionMinutes++;
            totalPlaytime++;
            localStorage.setItem('total-playtime', totalPlaytime);
            document.getElementById('session-time').innerText = sessionMinutes + "m";
            updateStatsUI();
        }, 60000); // Updates every 1 minute

        function updateStatsUI() {
            document.getElementById('stat-username').innerText = currentUser || "Guest";
            document.getElementById('stat-total-time').innerText = totalPlaytime;
        }

        // Simulated Online Counter
        function updateOnlineCount() {
            const base = Math.floor(Math.random() * 20) + 110; 
            document.getElementById('online-count').innerText = `${base} People Online`;
        }
        setInterval(updateOnlineCount, 5000);

        // Theme & Cloak Logic
        function updateTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('chicken-theme', theme);
        }

        function updateCloak(status) {
            localStorage.setItem('chicken-cloak', status);
        }

        window.onload = () => {
            if (currentUser) {
                document.getElementById('login-panel').style.display = 'none';
            }

            const savedTheme = localStorage.getItem('chicken-theme') || 'dark';
            const savedCloak = localStorage.getItem('chicken-cloak') || 'off';

            updateTheme(savedTheme);
            document.getElementById('theme-select').value = savedTheme;
            document.getElementById('cloak-select').value = savedCloak;
            updateStatsUI();

            if (savedCloak === 'on' && window.top === window.self) {
                const url = window.location.href;
                const win = window.open('about:blank', '_blank');
                if (win) {
                    win.document.body.style.margin = '0';
                    win.document.body.style.height = '100vh';
                    const iframe = win.document.createElement('iframe');
                    iframe.style.cssText = "border:none; width:100%; height:100%;";
                    iframe.src = url;
                    win.document.body.appendChild(iframe);
                    window.location.replace('https://google.com');
                }
            }
        };
    </script>
</body>
</html>
