<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --panel-bg: #1e1e1e;
        }

        [data-theme="light"] {
            --bg-color: #f0f0f0;
            --text-color: #121212;
            --accent-color: #e6b800;
            --panel-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            opacity: 0;
            animation: fadeInPage 1s forwards;
        }

        @keyframes fadeInPage { to { opacity: 1; } }

        /* Header & Nav */
        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .nav-buttons { display: flex; gap: 10px; }

        h1 { color: var(--accent-color); margin: 0; font-size: 1.8rem; }

        .btn {
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover { background: var(--accent-color); color: #000; }

        /* Games Container */
        #games { flex: 1; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* Overlay Panels (Settings, Friends, DMs) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .overlay.active { display: flex; }

        .panel-content {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444;
            background: #333; color: white; margin-top: 5px; box-sizing: border-box;
        }

        .close-btn { width: 100%; margin-top: 15px; }

        /* Footer */
        footer { text-align: center; padding: 20px; font-size: 0.9rem; opacity: 0.7; }
        .heart { color: #ff4d4d; }
    </style>
</head>
<body>

    <header>
        <h1>Chicken Games</h1>
        <div class="nav-buttons">
            <button class="btn" onclick="openPanel('friends-panel')">Friends</button>
            <button class="btn" onclick="openPanel('dm-panel')">DMs</button>
            <button class="btn" onclick="toggleSettings()">Settings</button>
        </div>
    </header>

    <div id="games"></div>

    <div id="settings-panel" class="overlay">
        <div class="panel-content">
            <h2>Settings</h2>
            <div class="input-group">
                <label>Theme</label>
                <select id="theme-select" onchange="updateTheme(this.value)">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                </select>
            </div>
            <div class="input-group">
                <label>Automatic Cloaking</label>
                <select id="cloak-select" onchange="updateCloak(this.value)">
                    <option value="off">Off</option>
                    <option value="on">On (About:Blank)</option>
                </select>
            </div>
            <button class="btn close-btn" onclick="toggleSettings()">Save & Close</button>
        </div>
    </div>

    <div id="friends-panel" class="overlay">
        <div class="panel-content">
            <h2>Add Friend</h2>
            <div class="input-group">
                <input type="text" id="friend-search" placeholder="Enter username...">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="searchFriend()">Send Request</button>
            </div>
            <p id="friend-status"></p>
            <h3>Current Friends</h3>
            <div id="friends-list">Log in to see friends.</div>
            <button class="btn close-btn" onclick="closePanel('friends-panel')">Back to Games</button>
        </div>
    </div>

    <div id="dm-panel" class="overlay">
        <div class="panel-content">
            <h2>Direct Messages</h2>
            <div id="dm-list" style="height: 200px; background: #222; margin-bottom: 10px; padding: 10px; border-radius: 5px; overflow-y: auto;">
                Select a friend to chat.
            </div>
            <input type="text" id="dm-input" placeholder="Type a message...">
            <button class="btn" style="width:100%; margin-top:10px;" onclick="sendDM()">Send</button>
            <button class="btn close-btn" onclick="closePanel('dm-panel')">Back to Games</button>
        </div>
    </div>

    <footer>Made with <span class="heart">❤</span> by chickenmonkey278</footer>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    <script>
        // 1. SUPABASE CONNECTION
        const SB_URL = 'https://ktubysfkhindjtnygxba.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // 2. LUMIN INITIALIZATION (Your Games)
        Lumin.init({ container: '#games', theme: 'dark' });

        // 3. PANEL LOGIC
        function openPanel(id) { document.getElementById(id).classList.add('active'); }
        function closePanel(id) { document.getElementById(id).classList.remove('active'); }

        const settingsPanel = document.getElementById('settings-panel');
        function toggleSettings() {
            if (settingsPanel.classList.contains('active')) {
                settingsPanel.style.opacity = '0';
                setTimeout(() => settingsPanel.classList.remove('active'), 300);
            } else {
                settingsPanel.classList.add('active');
                setTimeout(() => settingsPanel.style.opacity = '1', 10);
            }
        }

        // 4. FRIEND LOGIC
        async function searchFriend() {
            const username = document.getElementById('friend-search').value;
            const status = document.getElementById('friend-status');

            const { data, error } = await supabase.from('profiles').select('id').eq('username', username).single();

            if (data) {
                status.style.color = "lightgreen";
                status.innerText = "Success! Friend request sent.";
                // Logic to add to a "friends" table could go here
            } else {
                status.style.color = "red";
                status.innerText = "Invalid! This username is invalid.";
            }
        }

        // 5. SETTINGS & CLOAKING
        function updateTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('chicken-theme', theme);
        }
        function updateCloak(status) { localStorage.setItem('chicken-cloak', status); }

        window.onload = () => {
            const savedTheme = localStorage.getItem('chicken-theme') || 'dark';
            const savedCloak = localStorage.getItem('chicken-cloak') || 'off';
            updateTheme(savedTheme);
            document.getElementById('theme-select').value = savedTheme;
            document.getElementById('cloak-select').value = savedCloak;

            // Cloak logic
            if (savedCloak === 'on' && window.top === window.self) {
                const win = window.open('about:blank', '_blank');
                if (win) {
                    win.document.body.style.margin = '0';
                    win.document.body.style.height = '100vh';
                    const iframe = win.document.createElement('iframe');
                    iframe.style.width = '100%'; iframe.style.height = '100%';
                    iframe.style.border = 'none'; iframe.src = window.location.href;
                    win.document.body.appendChild(iframe);
                    window.location.replace('https://google.com');
                }
            }
        };
    </script>
</body>
</html>
