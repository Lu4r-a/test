<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --panel-bg: #1e1e1e;
        }

        [data-theme="light"] {
            --bg-color: #f0f0f0;
            --text-color: #121212;
            --accent-color: #e6b800;
            --panel-bg: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--accent-color); margin: 0; font-size: 1.8rem; }

        .nav-btns { display: flex; gap: 10px; }
        .settings-btn, .social-btn {
            background: none; border: 2px solid var(--accent-color);
            color: var(--accent-color); padding: 8px 16px;
            cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s;
        }
        .settings-btn:hover, .social-btn:hover { background: var(--accent-color); color: #000; }

        #games { flex: 1; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; min-height: 500px; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.active { display: flex; opacity: 1; }
        .modal-content {
            background: var(--panel-bg); padding: 25px; border-radius: 15px;
            width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input, select, .close-btn, .action-btn {
            width: 100%; padding: 10px; border-radius: 5px; margin-top: 10px;
            border: 1px solid #444; background: #333; color: white; box-sizing: border-box;
        }
        .action-btn { background: var(--accent-color); color: black; font-weight: bold; border: none; cursor: pointer; }

        #chat-box { height: 150px; border: 1px solid #444; overflow-y: auto; padding: 5px; margin-top: 10px; font-size: 0.8rem; background: #111; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }

        footer { text-align: center; padding: 20px; font-size: 0.9rem; opacity: 0.7; }
        .heart { color: #ff4d4d; }
    </style>
</head>
<body>

    <header>
        <h1>Chicken Games</h1>
        <div class="nav-btns">
            <button class="social-btn" onclick="toggleModal('social-panel')">Social</button>
            <button class="settings-btn" onclick="toggleModal('settings-panel')">Settings</button>
        </div>
    </header>

    <div id="games"></div>

    <div id="settings-panel" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <label>Theme</label>
            <select id="theme-select" onchange="updateTheme(this.value)">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
            </select>
            <label style="display:block; margin-top:15px;">Automatic Cloaking</label>
            <select id="cloak-select" onchange="updateCloak(this.value)">
                <option value="off">Off</option>
                <option value="on">On (About:Blank)</option>
            </select>
            <button class="close-btn" onclick="toggleModal('settings-panel')">Save & Close</button>
        </div>
    </div>

    <div id="social-panel" class="modal">
        <div class="modal-content">
            <div id="auth-ui">
                <h2>Account</h2>
                <input type="text" id="auth-username" placeholder="Username (for signup)">
                <input type="email" id="auth-email" placeholder="Email">
                <input type="password" id="auth-password" placeholder="Password">
                <button class="action-btn" onclick="handleAuth('login')">Login</button>
                <button class="action-btn" style="background:transparent; color:var(--accent-color); border:1px solid;" onclick="handleAuth('signup')">Sign Up</button>
            </div>

            <div id="social-ui" style="display:none;">
                <h2 id="welcome-user">Social</h2>
                <input type="text" id="friend-username" placeholder="Friend's Username">
                <button class="action-btn" onclick="addFriend()">Add Friend</button>
                <hr style="border:0; border-top:1px solid #444; margin:15px 0;">
                <select id="friend-list-select" onchange="loadMessages()"><option value="">Messages</option></select>
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button class="action-btn" onclick="sendDM()">Send</button>
                <button class="close-btn" onclick="logout()">Logout</button>
            </div>
            <button class="close-btn" onclick="toggleModal('social-panel')" style="background:none; border:none; text-decoration:underline;">Close</button>
        </div>
    </div>

    <footer>Made with <span class="heart">❤</span> by chickenmonkey278</footer>

    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = 'https://ktubysfkhindjtnygxba.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) { console.error("Supabase failed to load", e); }

        let currentUser = null;

        // --- UI LOGIC ---
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('active');
        }

        function updateTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('chicken-theme', theme);
        }

        function updateCloak(status) {
            localStorage.setItem('chicken-cloak', status);
        }

        // --- AUTH & SOCIAL ---
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;

            if (type === 'signup') {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) return alert(error.message);
                await supabase.from('profiles').insert([{ id: data.user.id, username: username, friends: "" }]);
                alert("Account created! Now please Login.");
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) return alert(error.message);
                checkUser();
            }
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if(profile) {
                    document.getElementById('auth-ui').style.display = 'none';
                    document.getElementById('social-ui').style.display = 'block';
                    document.getElementById('welcome-user').innerText = `Yo, ${profile.username}`;
                    loadFriendsList(profile.friends);
                }
            }
        }

        async function addFriend() {
            const targetName = document.getElementById('friend-username').value;
            const { data: target } = await supabase.from('profiles').select('id').eq('username', targetName).single();
            if (!target) return alert("User not found!");

            const { data: me } = await supabase.from('profiles').select('friends').eq('id', currentUser.id).single();
            let currentFriends = me.friends ? me.friends.split(',') : [];
            if(!currentFriends.includes(target.id)) {
                currentFriends.push(target.id);
                await supabase.from('profiles').update({ friends: currentFriends.join(',') }).eq('id', currentUser.id);
                alert("Added!");
                loadFriendsList(currentFriends.join(','));
            }
        }

        async function loadFriendsList(str) {
            if(!str) return;
            const ids = str.split(',');
            const { data: friends } = await supabase.from('profiles').select('id, username').in('id', ids);
            const sel = document.getElementById('friend-list-select');
            sel.innerHTML = '<option value="">Select Friend</option>';
            friends.forEach(f => {
                sel.innerHTML += `<option value="${f.id}">${f.username}</option>`;
            });
        }

        async function sendDM() {
            const rid = document.getElementById('friend-list-select').value;
            const msg = document.getElementById('chat-input').value;
            if(!rid || !msg) return;
            await supabase.from('messages').insert([{ sender_id: currentUser.id, receiver_id: rid, content: msg }]);
            document.getElementById('chat-input').value = '';
            loadMessages();
        }

        async function loadMessages() {
            const rid = document.getElementById('friend-list-select').value;
            if(!rid) return;
            const { data: msgs } = await supabase.from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${rid}),and(sender_id.eq.${rid},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            const box = document.getElementById('chat-box');
            box.innerHTML = msgs.map(m => `<div class="msg"><b>${m.sender_id === currentUser.id ? 'Me' : 'Them'}:</b> ${m.content}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function logout() { supabase.auth.signOut(); location.reload(); }

        // --- ONLOAD ---
        window.onload = () => {
            // Load Games
            if (typeof Lumin !== 'undefined') {
                Lumin.init({ container: '#games', theme: 'dark' });
            }

            // Load Settings
            const savedTheme = localStorage.getItem('chicken-theme') || 'dark';
            updateTheme(savedTheme);
            document.getElementById('theme-select').value = savedTheme;

            // Auth Check
            if(supabase) checkUser();

            // Cloak Check
            const savedCloak = localStorage.getItem('chicken-cloak') || 'off';
            if (savedCloak === 'on' && window.top === window.self) {
                const url = window.location.href;
                const win = window.open('about:blank', '_blank');
                if (win) {
                    win.document.body.innerHTML = `<iframe style="border:none;width:100%;height:100vh;" src="${url}"></iframe>`;
                    window.location.replace('https://google.com');
                }
            }
        };

        setInterval(() => { if(currentUser) loadMessages(); }, 4000);
    </script>
</body>
</html>
