<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games - Social</title>
   <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --panel-bg: #1e1e1e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .nav-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn:hover, .btn.active {
            background: var(--accent-color);
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hidden { display: none; }

        input {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }

        .message-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 70% ;
        }

        .msg.sent { background: var(--accent-color); color: black; align-self: flex-end; }
        .msg.received { background: #444; color: white; align-self: flex-start; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn">← Back to Games</a>
        <button class="btn active" onclick="showTab('friends')">Friends</button>
        <button class="btn" onclick="showTab('dms')">DMs</button>
    </div>

    <div class="container" id="friends-tab">
        <h2>Your Friends</h2>
        <input type="text" id="friend-username" placeholder="Enter username to add...">
        <button class="btn" onclick="addFriend()">Add Friend</button>
        <ul id="friends-list" style="list-style: none; padding: 0; margin-top: 20px;">
            </ul>
    </div>

    <div class="container hidden" id="dms-tab">
        <h2>Direct Messages</h2>
        <div id="chat-partner-info">Select a friend to message</div>
        <div class="message-box" id="message-display"></div>
        <input type="text" id="message-input" placeholder="Type a message...">
        <button class="btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // SUPABASE CONFIG
        const SB_URL = "https://ktubysfkhindjtnygxba.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // Simple Session Mockup (In a real app, use Supabase Auth)
        let myId = localStorage.getItem('chicken-user-id') || crypto.randomUUID();
        localStorage.setItem('chicken-user-id', myId);

        let currentChatPartner = null;

        function showTab(tab) {
            document.getElementById('friends-tab').classList.toggle('hidden', tab !== 'friends');
            document.getElementById('dms-tab').classList.toggle('hidden', tab !== 'dms');
            
            const btns = document.querySelectorAll('.nav-bar .btn');
            btns[1].classList.toggle('active', tab === 'friends');
            btns[2].classList.toggle('active', tab === 'dms');
            
            if(tab === 'friends') loadFriends();
        }

        async function addFriend() {
            const username = document.getElementById('friend-username').value;
            if(!username) return;

            // Logic: Add friend username to your profile's 'friends' column
            // This is a simplified version for your current table structure
            const { data, error } = await supabase
                .from('profiles')
                .insert([{ id: myId, username: 'Me', friends: username }]);

            if (error) console.error(error);
            else {
                alert("Friend added!");
                loadFriends();
            }
        }

        async function loadFriends() {
            const list = document.getElementById('friends-list');
            list.innerHTML = 'Loading...';

            const { data, error } = await supabase.from('profiles').select('*');
            
            list.innerHTML = '';
            data?.forEach(profile => {
                if(profile.id !== myId) {
                    let li = document.createElement('li');
                    li.innerHTML = `${profile.username} <button class="btn" style="padding:4px 8px; font-size:12px" onclick="startChat('${profile.id}', '${profile.username}')">Message</button>`;
                    li.style.marginBottom = "10px";
                    list.appendChild(li);
                }
            });
        }

        function startChat(id, name) {
            currentChatPartner = id;
            document.getElementById('chat-partner-info').innerText = "Chatting with: " + name;
            showTab('dms');
            loadMessages();
        }

        async function sendMessage() {
            const content = document.getElementById('message-input').value;
            if(!content || !currentChatPartner) return;

            const { error } = await supabase
                .from('messages')
                .insert([{ 
                    sender_id: myId, 
                    receiver_id: currentChatPartner, 
                    content: content 
                }]);

            if(!error) {
                document.getElementById('message-input').value = '';
                loadMessages();
            }
        }

        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .or(`sender_id.eq.${myId},receiver_id.eq.${myId}`)
                .order('created_at', { ascending: true });

            const display = document.getElementById('message-display');
            display.innerHTML = '';
            
            data?.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.sender_id === myId ? 'sent' : 'received'}`;
                div.innerText = msg.content;
                display.appendChild(div);
            });
            display.scrollTop = display.scrollHeight;
        }

        // Auto-refresh messages every 3 seconds
        setInterval(() => {
            if(!document.getElementById('dms-tab').classList.contains('hidden')) loadMessages();
        }, 3000);

        window.onload = loadFriends;
    </script>
</body>
</html>
