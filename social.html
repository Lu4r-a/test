<script>
    const SB_URL = "https://ktubysfkhindjtnygxba.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4";
    const chickenDB = supabase.createClient(SB_URL, SB_KEY);

    let myId = localStorage.getItem('chicken-id') || crypto.randomUUID();
    let myUsername = localStorage.getItem('chicken-username');
    let currentChatPartner = null;

    // --- STATUS SYSTEM ---
    async function updateMyStatus(status) {
        if (!myUsername) return;
        await chickenDB.from('profiles').upsert({ 
            id: myId, 
            username: myUsername, 
            last_seen: new Date().toISOString(),
            status: status 
        });
    }

    // Update status every 30 seconds
    setInterval(() => updateMyStatus('Online'), 30000);
    // Detect Idle
    window.onblur = () => updateMyStatus('Idle');
    window.onfocus = () => updateMyStatus('Online');

    async function loadUsers() {
        const list = document.getElementById('friends-list');
        const { data } = await chickenDB.from('profiles').select('*');
        
        list.innerHTML = "";
        data.forEach(user => {
            if(user.id !== myId) {
                // Determine color
                let color = "red"; let text = "Offline";
                const lastSeen = new Date(user.last_seen);
                const now = new Date();
                
                // If seen in last 2 minutes
                if ((now - lastSeen) < 120000) {
                    if (user.status === 'Idle') { color = "yellow"; text = "Idle"; }
                    else { color = "green"; text = "Online"; }
                }

                list.innerHTML += `
                    <div class="user-card">
                        <span>
                            <span style="height:10px; width:10px; background:${color}; border-radius:50%; display:inline-block; margin-right:5px;"></span>
                            ${user.username} <small style="color:gray;">(${text})</small>
                        </span>
                        <button class="btn" onclick="startChat('${user.id}', '${user.username}')">Message</button>
                    </div>`;
            }
        });
    }

    // --- MESSAGE SYSTEM FIX ---
    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const content = input.value.trim();
        if(!content || !currentChatPartner) return;

        const { error } = await chickenDB.from('messages').insert([{ 
            sender_id: myId, 
            receiver_id: currentChatPartner, 
            content: content 
        }]);

        if(error) alert("Error: " + error.message);
        else {
            input.value = "";
            loadMessages(); // Show the message immediately
        }
    }

    async function loadMessages() {
        if(!currentChatPartner) return;
        const { data } = await chickenDB.from('messages')
            .select('*')
            .or(`and(sender_id.eq.${myId},receiver_id.eq.${currentChatPartner}),and(sender_id.eq.${currentChatPartner},receiver_id.eq.${myId})`)
            .order('created_at', { ascending: true });

        const display = document.getElementById('message-display');
        display.innerHTML = data.map(m => `
            <div style="text-align: ${m.sender_id === myId ? 'right' : 'left'}; margin: 5px;">
                <span style="background: ${m.sender_id === myId ? '#ffcc00' : '#444'}; color: ${m.sender_id === myId ? 'black' : 'white'}; padding: 5px 10px; border-radius: 10px; display: inline-block;">
                    ${m.content}
                </span>
            </div>
        `).join('');
        display.scrollTop = display.scrollHeight;
    }

    // Real-time listener for the chat
    chickenDB.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
        loadMessages();
    }).subscribe();

    window.onload = () => {
        if(myUsername) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            updateMyStatus('Online');
            loadUsers();
            setInterval(loadUsers, 5000); // Refresh list for dots
        }
    };
</script>
