<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Games - Social</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #121212; --text-color: #ffffff; --accent-color: #ffcc00; --panel-bg: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .nav-bar { width: 100%; max-width: 800px; display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { background: none; border: 2px solid var(--accent-color); color: var(--accent-color); padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; text-decoration: none; }
        .btn:hover, .btn.active { background: var(--accent-color); color: #000; }
        .container { width: 100%; max-width: 800px; background: var(--panel-bg); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        input { width: calc(100% - 24px); padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }
        .message-box { height: 200px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #111; }
        #status-dot { font-size: 12px; color: gray; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="btn">← Back</a>
        <button class="btn active" id="btn-friends" onclick="showTab('friends')">Friends</button>
        <button class="btn" id="btn-dms" onclick="showTab('dms')">DMs</button>
    </div>

    <div id="status-dot">Connecting to database...</div>

    <div class="container" id="friends-tab">
        <h2>Friends</h2>
        <input type="text" id="friend-username" placeholder="Type a username...">
        <button class="btn" onclick="addFriend()">Add Friend</button>
        <div id="friends-list" style="margin-top: 20px;">Checking friends...</div>
    </div>

    <div class="container hidden" id="dms-tab">
        <h2>Direct Messages</h2>
        <div id="chat-partner-info" style="margin-bottom:10px; color:var(--accent-color);">Select a friend first</div>
        <div class="message-box" id="message-display"></div>
        <input type="text" id="message-input" placeholder="Type a message...">
        <button class="btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const SB_URL = "https://ktubysfkhindjtnygxba.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4";
        
        // Fix: Use a different name for the client to avoid crashing
        const chickenDB = supabase.createClient(SB_URL, SB_KEY);
        
        let myId = localStorage.getItem('chicken-id') || "User-" + Math.floor(Math.random() * 10000);
        localStorage.setItem('chicken-id', myId);

        let currentChatPartner = null;

        function showTab(tab) {
            document.getElementById('friends-tab').classList.toggle('hidden', tab !== 'friends');
            document.getElementById('dms-tab').classList.toggle('hidden', tab !== 'dms');
            document.getElementById('btn-friends').classList.toggle('active', tab === 'friends');
            document.getElementById('btn-dms').classList.toggle('active', tab === 'dms');
        }

        async function loadFriends() {
            const status = document.getElementById('status-dot');
            const list = document.getElementById('friends-list');
            
            const { data, error } = await chickenDB.from('profiles').select('*');
            
            if (error) {
                status.innerText = "Error: " + error.message;
                status.style.color = "red";
            } else {
                status.innerText = "Connected as: " + myId;
                status.style.color = "green";
                list.innerHTML = data.length === 0 ? "No users found yet." : "";
                data.forEach(p => {
                    if(p.id !== myId) {
                        list.innerHTML += `<div style="margin-bottom:10px;">${p.username || 'Unknown'} <button class="btn" style="padding:2px 10px;" onclick="startChat('${p.id}', '${p.username}')">Chat</button></div>`;
                    }
                });
            }
        }

        function startChat(id, name) {
            currentChatPartner = id;
            document.getElementById('chat-partner-info').innerText = "Chatting with: " + name;
            showTab('dms');
        }

        async function addFriend() {
            const name = document.getElementById('friend-username').value;
            if(!name) return;
            const { error } = await chickenDB.from('profiles').upsert({ id: myId, username: name });
            if(!error) { alert("Profile set! You are now " + name); loadFriends(); }
        }

        // Initialize
        window.onload = loadFriends;
    </script>
</body>
</html>
