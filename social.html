<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Social - Login</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #121212; --text-color: #ffffff; --accent-color: #ffcc00; --panel-bg: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }

        .login-box {
            background: var(--panel-bg); padding: 40px; border-radius: 15px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px;
        }

        .nav-bar { width: 100%; max-width: 800px; display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { background: none; border: 2px solid var(--accent-color); color: var(--accent-color); padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; text-decoration: none; }
        .btn:hover, .btn.active { background: var(--accent-color); color: #000; }
        
        .container { width: 100%; max-width: 800px; background: var(--panel-bg); padding: 20px; border-radius: 15px; }
        .hidden { display: none !important; }
        
        input { width: calc(100% - 24px); padding: 12px; margin-bottom: 15px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }
        .user-card { background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color: var(--accent-color);">Chicken Social</h1>
            <p>Choose a username to enter</p>
            <input type="text" id="username-input" placeholder="Username...">
            <button class="btn" style="width: 100%;" onclick="login()">Enter Chat</button>
        </div>
    </div>

    <div id="main-content" class="hidden" style="width: 100%; max-width: 800px;">
        <div class="nav-bar">
            <a href="index.html" class="btn">← Back</a>
            <button class="btn active" id="btn-friends" onclick="showTab('friends')">Find People</button>
            <button class="btn" id="btn-dms" onclick="showTab('dms')">DMs</button>
        </div>

        <div class="container" id="friends-tab">
            <h2>Users Online</h2>
            <div id="friends-list">Loading users...</div>
        </div>

        <div class="container hidden" id="dms-tab">
            <h2 id="chat-header">Direct Messages</h2>
            <div id="message-display" style="height: 300px; overflow-y: auto; background: #111; padding: 10px; margin-bottom: 10px; border-radius: 5px;"></div>
            <input type="text" id="msg-input" placeholder="Write a message...">
            <button class="btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://ktubysfkhindjtnygxba.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4";
        const chickenDB = supabase.createClient(SB_URL, SB_KEY);

        let myId = localStorage.getItem('chicken-id') || crypto.randomUUID();
        let myUsername = localStorage.getItem('chicken-username');
        let currentChatPartner = null;

        async function login() {
            const userInp = document.getElementById('username-input').value.trim();
            if(userInp.length < 2) return alert("Username too short!");

            // Save to LocalStorage
            localStorage.setItem('chicken-id', myId);
            localStorage.setItem('chicken-username', userInp);
            myUsername = userInp;

            // Save to Supabase
            const { error } = await chickenDB.from('profiles').upsert({ 
                id: myId, 
                username: myUsername 
            });

            if(!error) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadUsers();
            } else {
                alert("Database Error: " + error.message);
            }
        }

        async function loadUsers() {
            const list = document.getElementById('friends-list');
            const { data } = await chickenDB.from('profiles').select('*');
            
            list.innerHTML = "";
            data.forEach(user => {
                if(user.id !== myId) {
                    list.innerHTML += `
                        <div class="user-card">
                            <span>${user.username}</span>
                            <button class="btn" style="padding: 5px 10px;" onclick="startChat('${user.id}', '${user.username}')">Message</button>
                        </div>`;
                }
            });
        }

        function startChat(id, name) {
            currentChatPartner = id;
            document.getElementById('chat-header').innerText = "Chat with " + name;
            showTab('dms');
        }

        function showTab(tab) {
            document.getElementById('friends-tab').classList.toggle('hidden', tab !== 'friends');
            document.getElementById('dms-tab').classList.toggle('hidden', tab !== 'dms');
            document.getElementById('btn-friends').classList.toggle('active', tab === 'friends');
            document.getElementById('btn-dms').classList.toggle('active', tab === 'dms');
        }

        // Auto-login if name exists
        window.onload = () => {
            if(myUsername) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadUsers();
            }
        };
    </script>
</body>
</html>
