<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Social - Pro</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #121212; --text-color: #ffffff; --accent-color: #ffcc00; --panel-bg: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .container { width: 90%; max-width: 900px; background: var(--panel-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-bar { width: 90%; max-width: 900px; display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: space-between; }
        
        .btn { background: none; border: 2px solid var(--accent-color); color: var(--accent-color); padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; text-decoration: none; transition: 0.2s; }
        .btn:hover, .btn.active { background: var(--accent-color); color: #000; }
        
        .hidden { display: none !important; }
        
        #message-display { height: 400px; overflow-y: auto; background: #111; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
        input { width: calc(100% - 24px); padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; font-size: 16px; }

        /* Status Dot Styling */
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online-dot { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .idle-dot { background: #ffcc00; box-shadow: 0 0 5px #ffcc00; }
        .offline-dot { background: #ff4d4d; }
        .status-text { font-size: 0.85rem; color: #bbb; margin-left: 4px; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #252525; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        #my-username-display { color: var(--accent-color); font-weight: bold; font-size: 0.9rem; background: rgba(255, 204, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent-color); }
    </style>
</head>
<body>

    <div id="login-screen" class="container" style="text-align: center; max-width: 400px;">
        <h1 style="color: var(--accent-color);">Chicken Social</h1>
        <input type="text" id="username-input" placeholder="Enter Username...">
        <button class="btn" style="width: 100%;" onclick="login()">Join Chat</button>
    </div>

    <div id="main-content" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="nav-bar">
            <div>
                <a href="index.html" class="btn">← Back</a>
                <button class="btn active" id="btn-friends" onclick="showTab('friends')">Users</button>
                <button class="btn" id="btn-dms" onclick="showTab('dms')">DMs</button>
            </div>
            <div id="my-username-display"></div>
        </div>

        <div id="friends-tab" class="container">
            <h2>Global Users</h2>
            <div id="friends-list">Searching for players...</div>
        </div>

        <div id="dms-tab" class="container hidden">
            <h2 id="chat-header">Select a user</h2>
            <div id="message-display"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="msg-input" placeholder="Type a message..." style="flex: 1;">
                <button class="btn" onclick="sendMessage()" style="margin-top:10px;">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Replace your entire <script> section with this:

const SB_URL = "https://ktubysfkhindjtnygxba.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0dWJ5c2ZraGluZGp0bnlneGJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTI5MzUsImV4cCI6MjA5MTg4ODkzNX0._28tnrLXjsdGaMXLlV_kUkWZjD0z3acF0BgGcSH12k4";
const sb = supabase.createClient(SB_URL, SB_KEY);

let myId = localStorage.getItem('chicken-id') || "User-" + Math.floor(Math.random() * 9999);
let myUsername = localStorage.getItem('chicken-username');
let currentPartner = null;

async function login() {
    const name = document.getElementById('username-input').value.trim();
    if (name.length < 2) return alert("Name too short!");
    localStorage.setItem('chicken-id', myId);
    localStorage.setItem('chicken-username', name);
    await sb.from('profiles').upsert({ id: myId, username: name, last_seen: new Date().toISOString(), status: 'online' });
    location.reload(); 
}

async function heartbeat() {
    if (!myUsername) return;
    const currentStatus = document.hasFocus() ? 'online' : 'idle';
    await sb.from('profiles').update({ last_seen: new Date().toISOString(), status: currentStatus }).eq('id', myId);
}

async function loadUsers() {
    const { data: allUsers } = await sb.from('profiles').select('*');
    const { data: myFriends } = await sb.from('friends').select('*').or(`user_id.eq.${myId},friend_id.eq.${myId}`);
    
    const list = document.getElementById('friends-list');
    const countDisplay = document.getElementById('online-count');
    list.innerHTML = "";
    
    let onlineTotal = 0;
    const now = new Date().getTime();

    allUsers.forEach(u => {
        // ALWAYS check the time first, regardless of friend status
        const lastSeen = new Date(u.last_seen).getTime();
        const isRecent = Math.abs(now - lastSeen) < 30000; 
        
        if (isRecent) onlineTotal++;
        if (u.id === myId) return;

        const friendship = myFriends.find(f => f.user_id === u.id || f.friend_id === u.id);
        const isAccepted = friendship && friendship.status === 'accepted';
        const isPending = friendship && friendship.status === 'pending';

        // Dot stays green because it checks 'isRecent' independently
        let dotClass = isRecent ? (u.status === 'idle' ? 'idle-dot' : 'online-dot') : 'offline-dot';
        let statusLabel = isRecent ? (u.status === 'idle' ? 'Idle' : 'Online') : 'Offline';

        let actionButton = `<button class="btn" onclick="sendFriendRequest('${u.id}')">Add Friend</button>`;
        if (isAccepted) {
            actionButton = `<button class="btn" onclick="startChat('${u.id}', '${u.username}')">Chat</button>`;
        } else if (isPending) {
            actionButton = friendship.friend_id === myId ? 
                `<button class="btn" onclick="acceptFriend('${friendship.id}')">Accept</button>` : 
                `<span style="color:gray; font-size:12px;">Pending</span>`;
        }

        list.innerHTML += `
            <div class="user-row">
                <span>
                    <span class="dot ${dotClass}"></span>
                    <strong>${u.username}</strong>
                    <span class="status-text">${statusLabel}</span>
                </span>
                ${actionButton}
            </div>`;
    });

    if(countDisplay) countDisplay.innerText = onlineTotal;
}

async function sendFriendRequest(targetId) {
    await sb.from('friends').insert([{ user_id: myId, friend_id: targetId, status: 'pending' }]);
    loadUsers();
}

async function acceptFriend(requestId) {
    await sb.from('friends').update({ status: 'accepted' }).eq('id', requestId);
    loadUsers();
}

function startChat(id, name) {
    currentPartner = id;
    document.getElementById('chat-header').innerText = "Chatting with " + name;
    showTab('dms');
    loadMessages();
}

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !currentPartner) return;
    await sb.from('messages').insert([{ sender_id: myId, receiver_id: currentPartner, content: content }]);
    input.value = "";
    loadMessages();
}

async function loadMessages() {
    if (!currentPartner) return;
    const { data } = await sb.from('messages').select('*').or(`sender_id.eq.${myId},receiver_id.eq.${myId}`).order('created_at', { ascending: true });
    const display = document.getElementById('message-display');
    display.innerHTML = data.filter(m => (m.sender_id === currentPartner && m.receiver_id === myId) || (m.sender_id === myId && m.receiver_id === currentPartner))
        .map(m => `<div style="text-align:${m.sender_id === myId ? 'right' : 'left'}; margin:8px;"><span style="background:${m.sender_id === myId ? '#ffcc00' : '#333'}; color:${m.sender_id === myId ? 'black' : 'white'}; padding:8px 15px; border-radius:15px; display:inline-block; max-width:75%;">${m.content}</span></div>`).join('');
    display.scrollTop = display.scrollHeight;
}

function showTab(tab) {
    document.getElementById('friends-tab').classList.toggle('hidden', tab !== 'friends');
    document.getElementById('dms-tab').classList.toggle('hidden', tab !== 'dms');
    document.getElementById('btn-friends').classList.toggle('active', tab === 'friends');
    document.getElementById('btn-dms').classList.toggle('active', tab === 'dms');
}

window.onload = () => {
    if (myUsername) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('my-username-display').innerText = "by the way, your username is " + myUsername;
        loadUsers();
        setInterval(loadUsers, 3000);    // 3-second status refresh
        setInterval(heartbeat, 5000);
        setInterval(loadMessages, 3000);
    }
};
    </script>
</body>
</html>
